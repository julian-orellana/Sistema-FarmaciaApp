# En dev se permite el frontend local (Angular 4200, otro 3000). (B2)
app:
  cors:
    allowed-origins: "http://localhost:4200,http://localhost:3000"

spring:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

management:
  endpoints:
    web:
      exposure:
        include: "health,info,prometheus,metrics,env,beans,mappings,loggers"
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: INFO
    farmacias.AppOchoa: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: DEBUG

springdoc:
  swagger-ui:
    enabled: true
  api-docs:
    enabled: true

loki:
  url: ${LOKI_URL:}
  username: ${LOKI_USERNAME:}
  password: ${LOKI_PASSWORD:}