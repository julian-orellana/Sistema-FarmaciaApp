# En prod solo se permite el dominio del frontend; nunca localhost. (B2)
# Sobreescribible por env var por si cambia el dominio sin recompilar.
app:
  cors:
    allowed-origins: "${CORS_ALLOWED_ORIGINS:https://farmacloud.software}"

spring:
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

management:
  endpoints:
    web:
      exposure:
        include: "health,prometheus"
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    root: WARN
    farmacias.AppOchoa: INFO
    org.hibernate.SQL: OFF
    org.hibernate.type.descriptor.sql.BasicBinder: OFF

springdoc:
  swagger-ui:
    enabled: false
  api-docs:
    enabled: false

loki:
  url: ${LOKI_URL}
  username: ${LOKI_USERNAME}
  password: ${LOKI_PASSWORD}