spring:
  application:
    name: "AppOchoa"

  # Tope de tamaño de página: un cliente no puede forzar páginas enormes
  # (?size=1000000) que presionen memoria/latencia. Spring recorta al máximo. (B1)
  data:
    web:
      pageable:
        max-page-size: 100
        default-page-size: 20

  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000

  jpa:
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
    open-in-view: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 1
    locations: classpath:db/migration

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:900000}
  refresh-expiration: ${REFRESH_TOKEN_EXPIRATION:604800000}

management:
  endpoints:
    web:
      exposure:
        include: "health,info,prometheus,metrics"
  endpoint:
    prometheus:
      enabled: true
    health:
      show-details: when-authorized
  metrics:
    tags:
      application: "AppOchoa"

springdoc:
  packages-to-scan: farmacias.AppOchoa
  paths-to-match: /**

app:
  cors:
    allowed-origins: "https://farmacloud.software"

loki:
  url: ${LOKI_URL:}
  username: ${LOKI_USERNAME:}
  password: ${LOKI_PASSWORD:}