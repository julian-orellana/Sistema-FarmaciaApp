name: Deploy to Production

on:
  push:
    branches: [ main, develop ]

jobs:

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for Gradle
        run: chmod +x gradlew

      - name: Run tests
        run: ./gradlew test

  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for Gradle
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew build -x test

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Imagen versionada (M12): se taggea con el SHA del commit (trazable y
          # con rollback) y ademas 'latest' como puntero al ultimo despliegue.
          tags: |
            julixxx23/app-ochoa:${{ github.sha }}
            julixxx23/app-ochoa:latest

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            # APP_IMAGE_TAG fija la version exacta (SHA) que el server debe correr.
            # GitHub interpola el SHA aqui antes de enviar el script por SSH.
            export APP_IMAGE_TAG="${{ github.sha }}"
            docker compose pull
            # up -d --wait (M12): recrea el contenedor manteniendo el viejo hasta
            # que el nuevo pasa el healthcheck, en vez de 'down' + 'up' (que dejaba
            # la app caida ~45s). Minimiza la ventana de downtime a la recreacion.
            docker compose up -d --wait
            # Limpiar imagenes viejas sin tag para no llenar el disco del server.
            docker image prune -f